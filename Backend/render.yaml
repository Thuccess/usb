services:
  - type: web
    name: moictusb-api
    runtime: node
    rootDir: Backend
    buildCommand: npm install && npm run build --workspace=@moictusb/shared && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: true
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: API_URL
        sync: false
      - key: DEFAULT_STREAM_URL
        sync: false
